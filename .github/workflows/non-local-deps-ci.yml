name: Non-Local Dependencies CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: non-local-deps-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  remote-repro:
    name: Remote Dependency Reproducibility
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift 6.2
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2"

      - name: Prepare artifact directory
        run: mkdir -p artifacts/ci

      - name: Cache Swift build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build
            Membrane/.build
            Swarm/.build
            ../Swarm/.build
          key: ${{ runner.os }}-swift-6.2-non-local-${{ hashFiles('Membrane/Package.resolved', 'Swarm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-6.2-non-local-

      - name: Verify remote dependency reproducibility
        run: |
          set -euo pipefail
          script_path="scripts/ci/verify_remote_deps.sh"
          if [[ ! -x "${script_path}" ]]; then
            script_path="../scripts/ci/verify_remote_deps.sh"
          fi
          if [[ ! -x "${script_path}" ]]; then
            echo "verify_remote_deps.sh not found" >&2
            exit 1
          fi
          "${script_path}" --retries 3 --mode full

      - name: Upload reproducibility artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: non-local-deps-ci
          path: artifacts/ci
          if-no-files-found: warn
